<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8"><style>
body { font-family: -apple-system, sans-serif; font-size: 13px; line-height: 1.6; color: #222; }
h2 { font-size: 15px; margin-bottom: 4px; }
ol { margin-top: 4px; padding-left: 20px; }
</style></head>
<body>
<h2>インストール完了</h2>
<ol>
  <li>DaVinci Resolve を起動（すでに起動中なら再起動）します。</li>
  <li>エフェクトライブラリの <b>OpenFX → Filters</b> から <b>AnimeRestore Denoise</b> を適用します。</li>
  <li>クリップの素材に合わせて <b>Source Media</b>（Film Scan / Video Tape / Digital Native）を選ぶと、欠陥除去の推奨既定値が設定されます。</li>
</ol>
<p>アンインストールは /Library/OFX/Plugins/AnimeRestore.ofx.bundle を削除してください。</p>
</body>
</html>
